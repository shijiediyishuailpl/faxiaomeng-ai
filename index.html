<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>法小萌儿童法律助手</title>

    <!-- 保留你原来的样式文件 -->
    <link rel="stylesheet" href="style.css">

    <!-- 新增动画和语音按钮样式 -->
    <style>
        #robotBox {
            position: relative;
            display: inline-block;
        }

        #robotBox img {
            display: block;
            margin: 0 auto;
            transform-origin: center bottom;
        }

        /* 思考状态：慢慢晃动 */
        #robotBox.thinking img {
            animation: thinkingAnimation 0.9s ease-in-out infinite !important;
        }

        /* 说话状态：轻微上下运动 */
        #robotBox.talking img {
            animation: talkingAnimation 0.35s ease-in-out infinite !important;
        }

        @keyframes thinkingAnimation {
            0% {
                transform: translateY(0) rotate(-1deg);
            }

            50% {
                transform: translateY(-8px) rotate(1deg);
            }

            100% {
                transform: translateY(0) rotate(-1deg);
            }
        }

        @keyframes talkingAnimation {
            0% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-4px) scale(1.015);
            }

            100% {
                transform: translateY(0) scale(1);
            }
        }

        #askButton:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .voice-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .voice-button {
            margin: 0;
            padding: 9px 15px;
            border: 1px solid #cbdcf5;
            border-radius: 14px;
            background: white;
            color: #3478ff;
            font-size: 14px;
            cursor: pointer;
        }

        .voice-button:hover:not(:disabled) {
            background: #edf5ff;
        }

        .voice-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #statusText {
            margin-top: 12px;
            color: #888;
            font-size: 14px;
        }

        textarea:focus {
            outline: 3px solid rgba(52, 120, 255, 0.16);
            border-color: #3478ff;
        }

        .screen-reader-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>


<body>

    <main class="container">

        <!-- 法小萌角色 -->
        <div
            class="robot"
            id="robotBox"
        >
            <img
                id="robotImg"
                src="faxiang_close.png"
                alt="法小萌儿童法律机器人"
            >
        </div>


        <h1>法小萌</h1>


        <div class="speech">
            💬 小朋友你好！<br>
            有什么法律问题可以问我哦～
        </div>


        <label
            for="question"
            class="screen-reader-only"
        >
            请输入法律问题
        </label>

        <textarea
            id="question"
            maxlength="300"
            placeholder="例如：有人找我要验证码怎么办？"
        ></textarea>
        <button
id="voiceButton"
class="voice-button"
type="button"
>
🎤 说出你的问题
</button>


        <button
            id="askButton"
            type="button"
        >
            问问法小萌
        </button>


        <section
            class="answer"
            aria-live="polite"
        >
            <h3>法小萌回答：</h3>

            <p id="answerText">
                等待你的问题哦～
            </p>

            <p id="statusText">
                在线陪伴中 🤖
            </p>

            <div class="voice-actions">

                <button
                    id="replayButton"
                    class="voice-button"
                    type="button"
                    disabled
                >
                    🔊 再听一次
                </button>

                <button
                    id="stopVoiceButton"
                    class="voice-button"
                    type="button"
                    disabled
                >
                    ⏹ 停止朗读
                </button>

            </div>
        </section>

    </main>


    <script src="script.js"></script>

</body>

</html>
