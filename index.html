<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta
        name="theme-color"
        content="#eaf7ff"
    >

    <title>法小萌儿童法律助手</title>

    <link rel="stylesheet" href="style.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 20px 12px;
        }

        .container {
            width: min(440px, 100%);
            margin: 20px auto;
        }

        #robotBox {
            position: relative;
            display: inline-block;
        }

        #robotBox img {
            display: block;
            margin: 0 auto;
            transform-origin: center bottom;
        }

        /* 思考状态 */
        #robotBox.thinking img {
            animation: thinkingAnimation 0.9s ease-in-out infinite !important;
        }

        /* 说话状态 */
        #robotBox.talking img {
            animation: talkingAnimation 0.35s ease-in-out infinite !important;
        }

        @keyframes thinkingAnimation {
            0% {
                transform: translateY(0) rotate(-1deg);
            }

            50% {
                transform: translateY(-8px) rotate(1deg);
            }

            100% {
                transform: translateY(0) rotate(-1deg);
            }
        }

        @keyframes talkingAnimation {
            0% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-4px) scale(1.015);
            }

            100% {
                transform: translateY(0) scale(1);
            }
        }

        .input-area {
            margin-top: 22px;
        }

        #question {
            display: block;
            width: 100%;
            min-height: 105px;
            resize: vertical;
        }

        #question:focus {
            outline: 3px solid rgba(52, 120, 255, 0.16);
            border-color: #3478ff;
        }

        .input-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .input-actions button {
            flex: 1;
            margin-top: 0;
        }

        #voiceButton {
            background: #edf6ff;
            color: #2464c9;
            border: 1px solid #bfd8ff;
        }

        #voiceButton.recording {
            background: #fff1f1;
            color: #d83b3b;
            border-color: #ffc4c4;
            animation: recordingPulse 1s ease-in-out infinite;
        }

        #voiceButton.listening {
            background: #effff4;
            color: #168343;
            border-color: #b7ebc9;
            animation: recordingPulse 1s ease-in-out infinite;
        }

        @keyframes recordingPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.025);
            }

            100% {
                transform: scale(1);
            }
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .voice-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .voice-actions .voice-button {
            margin: 0;
            padding: 9px 15px;
            border: 1px solid #cbdcf5;
            border-radius: 14px;
            background: white;
            color: #3478ff;
            font-size: 14px;
            cursor: pointer;
        }

        .voice-actions .voice-button:hover:not(:disabled) {
            background: #edf5ff;
        }

        #statusText {
            min-height: 22px;
            margin-top: 12px;
            color: #777;
            font-size: 14px;
        }

        #voiceHint {
            min-height: 20px;
            margin: 8px 0 0;
            color: #777;
            font-size: 13px;
        }

        #answerText {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            line-height: 1.7;
        }

        .screen-reader-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                margin: 8px auto;
                padding: 22px 16px;
            }

            .input-actions {
                flex-direction: column;
            }

            .input-actions button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <main class="container">

        <div
            class="robot"
            id="robotBox"
        >
            <img
                id="robotImg"
                src="faxiang_close.png"
                alt="法小萌儿童法律机器人"
            >
        </div>


        <h1>法小萌</h1>


        <div class="speech">
            💬 小朋友你好！<br>
            有什么法律问题可以问我哦～
        </div>


        <div class="input-area">

            <label
                for="question"
                class="screen-reader-only"
            >
                请输入法律问题
            </label>

            <textarea
                id="question"
                maxlength="300"
                placeholder="例如：有人找我要验证码怎么办？"
            ></textarea>


            <div class="input-actions">

                <button
                    id="voiceButton"
                    type="button"
                >
                    🎤 说出问题
                </button>

                <button
                    id="askButton"
                    type="button"
                >
                    问问法小萌
                </button>

            </div>

            <p id="voiceHint">
                点击麦克风后，请对着手机清楚地说话。
            </p>

        </div>


        <section
            class="answer"
            aria-live="polite"
        >
            <h3>法小萌回答：</h3>

            <p id="answerText">
                等待你的问题哦～
            </p>

            <p id="statusText">
                在线陪伴中 🤖
            </p>

            <div class="voice-actions">

                <button
                    id="replayButton"
                    class="voice-button"
                    type="button"
                    disabled
                >
                    🔊 再听一次
                </button>

                <button
                    id="stopVoiceButton"
                    class="voice-button"
                    type="button"
                    disabled
                >
                    ⏹ 停止朗读
                </button>

            </div>
        </section>

    </main>

    <!-- 改版本号可以防止手机读取旧缓存 -->
    <script src="script.js?v=10"></script>

</body>

</html>
